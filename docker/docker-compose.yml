services:
  postgres:
    image: postgres:16-alpine
    container_name: face_control_pg
    environment:
      POSTGRES_USER: face_control
      POSTGRES_PASSWORD: face_control
      POSTGRES_DB: face_control
    ports:
      - "5432:5432"
    volumes:
      - face_control_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_control"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: face_control_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - face_control_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  face_control_pg:
  face_control_minio:
